<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jays Game Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0f12;
      --surface:  #161a20;
      --border:   #2a2f38;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --yes:      #1db876;
      --no:       #e24b4a;
      --soon:     #d4902a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .card-header { margin-bottom: 1.5rem; }

    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 1.5px;
      color: var(--text);
    }

    .eyebrow {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .question-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      font-style: italic;
    }

    .big-answer {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 88px;
      line-height: 1;
      letter-spacing: 2px;
      margin: 0.25rem 0 1.25rem;
    }
    .big-yes  { color: var(--yes); }
    .big-no   { color: var(--no); }
    .big-soon { color: var(--soon); font-size: 60px; }
    .big-load { color: var(--muted); font-size: 40px; }

    .matchup-callout {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1b2029;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 1.25rem;
    }

    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex: 1;
    }

    .team-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .team-abbr {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .at-sep {
      font-size: 13px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .game-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .game-meta-time {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }

    .live-pip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--yes);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--yes);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    .reveal-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .reveal-btn:hover { background: #1e2229; color: var(--text); }

    .score-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 0;
    }
    .score-team {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      min-width: 40px;
    }
    .score-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px;
      line-height: 1;
    }
    .score-pts.win  { color: var(--yes); }
    .score-pts.loss { color: var(--no); }
    .score-pts.tie  { color: var(--text); }
    .score-sep { font-size: 14px; color: var(--border); }

    .outcome-line {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .inning-line {
      font-size: 11px;
      color: var(--yes);
      margin-top: 4px;
      margin-bottom: 10px;
    }

    .status-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.5rem;
    }
    .last-updated { font-size: 10px; color: var(--muted); }

    .refresh-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .refresh-btn:hover { background: #1e2229; color: var(--text); }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .err-text { font-size: 11px; color: var(--no); margin-top: 8px; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="wordmark">Blue Jays</div>
    <div class="eyebrow">Game status</div>
    <div class="question-note">Is today's game done?</div>
  </div>

  <div class="big-answer big-load" id="big"><span class="spinner"></span></div>

  <div id="matchup-area"></div>

  <hr class="divider">

  <div id="detail" style="min-height: 40px;"></div>

  <div class="meta-row">
    <span class="last-updated" id="updated"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="load()">Refresh ↻</button>
  </div>
</div>

<script>
  const TOR_ID = 141;
  const BASE   = 'https://statsapi.mlb.com/api/v1';
  const LOGO   = id => `https://www.mlbstatic.com/team-logos/${id}.svg`;

  let scoreVisible = false;
  let state = null;

  function today() {
    const d = new Date();
    return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
  }

  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }

  function revealBtn() {
    return `<button class="reveal-btn" id="revealBtn">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <ellipse cx="8" cy="8" rx="6.5" ry="5" stroke="currentColor" stroke-width="1.3"/>
        <circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      Reveal score
    </button>`;
  }

  function renderScoreBlock(s) {
    if (!s) return '';
    const { torPts, oppPts, oppAbbr } = s;
    const torWin = torPts > oppPts, oppWin = oppPts > torPts;
    return `<div class="score-row">
      <span class="score-team">TOR</span>
      <span class="score-pts ${torWin?'win':oppWin?'loss':'tie'}">${torPts}</span>
      <span class="score-sep">—</span>
      <span class="score-pts ${oppWin?'win':torWin?'loss':'tie'}">${oppPts}</span>
      <span class="score-team" style="text-align:right">${oppAbbr}</span>
    </div>`;
  }

  function renderMatchup(data) {
    if (!data.homeId) return '';

    const liveIndicator = data.status === 'live'
      ? `<div class="live-pip"><span class="live-dot"></span>In progress</div>` : '';

    let timeStr = data.gameTime || '';
    if (data.status === 'upcoming' && data.startTimeUTC) {
      const start = new Date(data.startTimeUTC);
      const mins  = Math.round((start - Date.now()) / 60000);
      const h = Math.floor(Math.abs(mins) / 60), m = Math.abs(mins) % 60;
      const cd = mins > 0 ? (h > 0 ? `${h}h ${m}m away` : `${m}m away`) : 'Starting soon';
      timeStr = `${data.gameTime} · ${cd}`;
    }

    return `<div class="matchup-callout">
      <div class="team-block">
        <img class="team-logo" src="${LOGO(data.awayId)}" alt="${data.awayAbbr}" onerror="this.style.display='none'">
        <span class="team-abbr">${data.awayAbbr}</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
        <span class="at-sep">@</span>
        <div class="game-meta">
          <div class="game-meta-time">${timeStr}</div>
          ${liveIndicator}
        </div>
      </div>
      <div class="team-block">
        <img class="team-logo" src="${LOGO(data.homeId)}" alt="${data.homeAbbr}" onerror="this.style.display='none'">
        <span class="team-abbr">${data.homeAbbr}</span>
      </div>
    </div>`;
  }

  function render(data) {
    state = data;
    const big         = document.getElementById('big');
    const detail      = document.getElementById('detail');
    const matchupArea = document.getElementById('matchup-area');
    document.getElementById('updated').textContent = 'Updated ' + nowTime();

    matchupArea.innerHTML = renderMatchup(data);

    if (data.status === 'live') {
      big.className = 'big-answer big-no';
      big.textContent = 'NO';
      const inningTxt = data.inning ? `${data.inningHalf} ${data.inning}` : '';
      const inningHtml = inningTxt ? `<div class="inning-line">${inningTxt}</div>` : '';
      const scoreHtml = scoreVisible ? renderScoreBlock(data.score) : revealBtn();
      detail.innerHTML = `${inningHtml}<div>${scoreHtml}</div>`;

    } else if (data.status === 'final') {
      big.className = 'big-answer big-yes';
      big.textContent = 'YES';
      const won = data.score && data.score.torPts > data.score.oppPts;
      const scoreHtml = scoreVisible
        ? renderScoreBlock(data.score) + `<div class="outcome-line">Jays ${won ? 'won' : 'lost'}</div>`
        : revealBtn();
      detail.innerHTML = `<div class="status-label">Game finished</div><div>${scoreHtml}</div>`;

    } else if (data.status === 'upcoming') {
      big.className = 'big-answer big-soon';
      big.textContent = 'Not yet';
      detail.innerHTML = `<div class="status-label">Game hasn't started yet</div>`;

    } else if (data.status === 'none') {
      big.className = 'big-answer big-yes';
      big.textContent = 'YES';
      detail.innerHTML = data.nextGame
        ? `<div class="status-label">No game today · Next: ${data.nextGame}</div>`
        : `<div class="status-label">No game scheduled today</div>`;

    } else if (data.status === 'error') {
      big.className = 'big-answer big-no';
      big.textContent = 'ERR';
      detail.innerHTML = `<div class="err-text">${data.message}</div>`;
    }

    const rb = document.getElementById('revealBtn');
    if (rb) rb.addEventListener('click', () => { scoreVisible = true; render(state); });
  }

  async function load() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = '...';
    scoreVisible = false;

    try {
      const schedRes  = await fetch(`${BASE}/schedule?sportId=1&teamId=${TOR_ID}&date=${today()}&hydrate=linescore,team`);
      const schedData = await schedRes.json();
      const dates     = schedData.dates || [];

      if (!dates.length || !dates[0].games.length) {
        render({ status: 'none', nextGame: await getNextGame() });
        return;
      }

      const game          = dates[0].games[0];
      const gamePk        = game.gamePk;
      const abstractState = game.status.abstractGameState;
      const detailedState = game.status.detailedState;
      const homeTeam      = game.teams.home.team;
      const awayTeam      = game.teams.away.team;
      const isTorHome     = homeTeam.id === TOR_ID;
      const oppTeam       = isTorHome ? awayTeam : homeTeam;
      const startUTC      = game.gameDate;
      const localTime     = new Date(startUTC).toLocaleTimeString([], {
        hour: 'numeric', minute: '2-digit', timeZone: 'America/Toronto'
      }) + ' ET';

      const base = {
        homeId:      homeTeam.id,
        awayId:      awayTeam.id,
        homeAbbr:    homeTeam.abbreviation,
        awayAbbr:    awayTeam.abbreviation,
        gameTime:    localTime,
        startTimeUTC: startUTC,
      };

      if (abstractState === 'Live' || detailedState === 'In Progress') {
        const ls     = game.linescore || await fetchLinescore(gamePk);
        const torPts = isTorHome ? (ls.teams?.home?.runs ?? '?') : (ls.teams?.away?.runs ?? '?');
        const oppPts = isTorHome ? (ls.teams?.away?.runs ?? '?') : (ls.teams?.home?.runs ?? '?');
        render({ ...base, status: 'live',
          inning:     ls.currentInning ? `Inning ${ls.currentInning}` : '',
          inningHalf: ls.inningHalf || '',
          score: { torPts, oppPts, oppAbbr: oppTeam.abbreviation }
        });

      } else if (abstractState === 'Final' || detailedState.includes('Final')) {
        const ls     = game.linescore || await fetchLinescore(gamePk);
        const torPts = isTorHome ? (ls.teams?.home?.runs ?? '?') : (ls.teams?.away?.runs ?? '?');
        const oppPts = isTorHome ? (ls.teams?.away?.runs ?? '?') : (ls.teams?.home?.runs ?? '?');
        render({ ...base, status: 'final',
          score: { torPts, oppPts, oppAbbr: oppTeam.abbreviation }
        });

      } else {
        render({ ...base, status: 'upcoming' });
      }

    } catch (e) {
      render({ status: 'error', message: 'Could not reach MLB API. Check your connection.' });
    }

    btn.disabled = false;
    btn.textContent = 'Refresh ↻';
  }

  async function fetchLinescore(gamePk) {
    const r = await fetch(`${BASE}/game/${gamePk}/linescore`);
    return r.json();
  }

  async function getNextGame() {
    try {
      const future = new Date(); future.setDate(future.getDate() + 1);
      const end    = new Date(); end.setDate(end.getDate() + 14);
      const fmt    = d => d.toISOString().slice(0, 10);
      const r      = await fetch(`${BASE}/schedule?sportId=1&teamId=${TOR_ID}&startDate=${fmt(future)}&endDate=${fmt(end)}`);
      const d      = await r.json();
      const next   = d.dates?.[0]?.games?.[0];
      if (!next) return null;
      return new Date(next.gameDate).toLocaleDateString([], {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', timeZone: 'America/Toronto'
      }) + ' ET';
    } catch { return null; }
  }

  load();
  setInterval(load, 60000);
</script>
</body>
</html>
