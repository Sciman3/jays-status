<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB Game Status</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <meta name="theme-color" content="#0d0f12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Game Status">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f12;
      --surface: #161a20;
      --border:  #2a2f38;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --sub:     #9ca3af;
      --yes:     #1db876;
      --no:      #e24b4a;
      --soon:    #d4902a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    /* ── Header ── */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .header-left { display: flex; flex-direction: column; gap: 0; }

    .wordmark {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      line-height: 1;
      letter-spacing: 1.5px;
      color: var(--text);
    }

    .eyebrow {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .question-note {
      font-size: 13px;
      color: var(--sub);
      margin-top: 7px;
      font-style: italic;
      letter-spacing: 0.2px;
    }

    /* ── Settings button ── */
    .settings-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .settings-btn:hover { background: #1e2229; color: var(--text); }

    /* ── Big answer ── */
    .big-answer {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 88px;
      line-height: 1;
      letter-spacing: 2px;
      margin: 0.25rem 0 1.25rem;
    }
    .big-yes  { color: var(--yes); }
    .big-no   { color: var(--no); }
    .big-soon { color: var(--soon); font-size: 60px; }
    .big-load { color: var(--muted); font-size: 40px; }

    /* ── Matchup callout ── */
    .matchup-callout {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1b2029;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 1.25rem;
    }
    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex: 1;
    }
    .team-logo { width: 48px; height: 48px; object-fit: contain; }
    .team-abbr { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 1px; }
    .at-sep    { font-size: 13px; color: var(--muted); flex-shrink: 0; }
    .game-meta { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .game-meta-time { font-size: 11px; color: var(--muted); text-align: center; }

    .live-pip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--yes);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--yes);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── Divider / detail ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

    .reveal-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .reveal-btn:hover { background: #1e2229; color: var(--text); }

    .score-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 0;
    }
    .score-team { font-size: 12px; font-weight: 500; color: var(--muted); min-width: 40px; }
    .score-pts  { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; }
    .score-pts.win  { color: var(--yes); }
    .score-pts.loss { color: var(--no); }
    .score-pts.tie  { color: var(--text); }
    .score-sep { font-size: 14px; color: var(--border); }

    .outcome-line { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .inning-line  { font-size: 11px; color: var(--yes); margin-top: 4px; margin-bottom: 10px; }
    .status-label { font-size: 11px; color: var(--muted); margin-bottom: 0.75rem; }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.5rem;
    }
    .last-updated { font-size: 10px; color: var(--muted); }

    .refresh-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .refresh-btn:hover   { background: #1e2229; color: var(--text); }
    .refresh-btn:disabled{ opacity: 0.4; cursor: not-allowed; }

    .notif-btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .notif-btn:hover { background: #1e2229; color: var(--text); }
    .notif-btn.active { border-color: var(--yes); color: var(--yes); }
    .notif-btn.denied { opacity: 0.4; cursor: not-allowed; }

    .setting-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 2px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
    }
    .setting-toggle-title { font-size: 12px; color: var(--text); }
    .setting-toggle-sub   { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .toggle-track {
      width: 34px; height: 18px;
      border-radius: 9px;
      background: var(--border);
      position: relative;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle-track.on { background: var(--yes); }
    .toggle-knob {
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--text);
      transition: transform 0.2s;
    }
    .toggle-track.on .toggle-knob { transform: translateX(16px); }

    .modal-section-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 2px 2px 6px;
    }

    .siri-row {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .siri-row.visible { display: block; }

    .siri-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
    }
    .siri-btn:hover { background: #1e2229; color: var(--text); }

    .err-text { font-size: 11px; color: var(--no); margin-top: 8px; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .modal-close {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-search {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      background: #1b2029;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      color: var(--text);
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .modal-search::placeholder { color: var(--muted); }
    .modal-search:focus { border-color: var(--sub); }

    .team-list {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .team-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .team-option:hover { background: #1b2029; }
    .team-option.selected {
      background: #1b2029;
      border-color: var(--sub);
    }
    .team-option img { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; }
    .team-option-name { font-size: 12px; color: var(--text); }
    .team-option-abbr { font-size: 10px; color: var(--muted); margin-left: auto; letter-spacing: 1px; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="header-left">
      <div class="wordmark" id="wordmark">Blue Jays</div>
      <div class="eyebrow">Game status</div>
      <div class="question-note" id="questionNote">Is today's game done?</div>
    </div>
    <button class="settings-btn" id="settingsBtn" aria-label="Settings">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="big-answer big-load" id="big"><span class="spinner"></span></div>
  <div id="matchup-area"></div>
  <hr class="divider">
  <div id="detail" style="min-height: 40px;"></div>

  <div class="meta-row">
    <span class="last-updated" id="updated"></span>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="notif-btn" id="notifBtn" title="Enable notifications"></button>
      <button class="refresh-btn" id="refreshBtn" onclick="load()">Refresh ↻</button>
    </div>
  </div>

  <div class="siri-row" id="siriRow">
    <a class="siri-btn" id="siriBtn" href="#" target="_blank" rel="noopener">
      <svg width="13" height="13" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="10" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 11c0-1.1.4-2 1.2-2.7A3.8 3.8 0 0 1 11 7.5c1 0 1.9.3 2.6.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M15 11c0 1.1-.4 2-1.2 2.7A3.8 3.8 0 0 1 11 14.5c-1 0-1.9-.3-2.6-.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="11" cy="11" r="1.5" fill="currentColor"/>
      </svg>
      Add to Siri Shortcuts
    </a>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Settings</span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>

    <div class="setting-toggle-row" id="showScoresRow">
      <div>
        <div class="setting-toggle-title">Show scores</div>
        <div class="setting-toggle-sub">Reveal scores on the page and in notifications</div>
      </div>
      <div class="toggle-track" id="showScoresTrack"><div class="toggle-knob"></div></div>
    </div>

    <div class="modal-section-label">Team</div>
    <input class="modal-search" id="teamSearch" placeholder="Search teams..." autocomplete="off">
    <div class="team-list" id="teamList"></div>
  </div>
</div>

<script>
  // ── Service worker registration ───────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  // ── Siri Shortcut link ────────────────────────────────────────────
  // Replace this URL with your iCloud sharing link after creating the
  // shortcut in the Shortcuts app (Share → Copy iCloud Link).
  const SHORTCUT_ICLOUD_URL = 'https://www.icloud.com/shortcuts/5b51f35b2168440584b3671aa7ecb33c';

  (function initSiriBtn() {
    const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
    if (!isApple || !SHORTCUT_ICLOUD_URL) return;
    const row = document.getElementById('siriRow');
    const btn = document.getElementById('siriBtn');
    btn.href = SHORTCUT_ICLOUD_URL;
    row.classList.add('visible');
  })();

  // ── All 30 MLB teams ──────────────────────────────────────────────
  const TEAMS = [
    { id: 109, abbr: 'ARI', name: 'Arizona Diamondbacks' },
    { id: 144, abbr: 'ATL', name: 'Atlanta Braves' },
    { id: 110, abbr: 'BAL', name: 'Baltimore Orioles' },
    { id: 111, abbr: 'BOS', name: 'Boston Red Sox' },
    { id: 112, abbr: 'CHC', name: 'Chicago Cubs' },
    { id: 145, abbr: 'CWS', name: 'Chicago White Sox' },
    { id: 113, abbr: 'CIN', name: 'Cincinnati Reds' },
    { id: 114, abbr: 'CLE', name: 'Cleveland Guardians' },
    { id: 115, abbr: 'COL', name: 'Colorado Rockies' },
    { id: 116, abbr: 'DET', name: 'Detroit Tigers' },
    { id: 117, abbr: 'HOU', name: 'Houston Astros' },
    { id: 118, abbr: 'KC',  name: 'Kansas City Royals' },
    { id: 108, abbr: 'LAA', name: 'Los Angeles Angels' },
    { id: 119, abbr: 'LAD', name: 'Los Angeles Dodgers' },
    { id: 146, abbr: 'MIA', name: 'Miami Marlins' },
    { id: 158, abbr: 'MIL', name: 'Milwaukee Brewers' },
    { id: 142, abbr: 'MIN', name: 'Minnesota Twins' },
    { id: 121, abbr: 'NYM', name: 'New York Mets' },
    { id: 147, abbr: 'NYY', name: 'New York Yankees' },
    { id: 133, abbr: 'OAK', name: 'Oakland Athletics' },
    { id: 143, abbr: 'PHI', name: 'Philadelphia Phillies' },
    { id: 134, abbr: 'PIT', name: 'Pittsburgh Pirates' },
    { id: 135, abbr: 'SD',  name: 'San Diego Padres' },
    { id: 137, abbr: 'SF',  name: 'San Francisco Giants' },
    { id: 136, abbr: 'SEA', name: 'Seattle Mariners' },
    { id: 138, abbr: 'STL', name: 'St. Louis Cardinals' },
    { id: 139, abbr: 'TB',  name: 'Tampa Bay Rays' },
    { id: 140, abbr: 'TEX', name: 'Texas Rangers' },
    { id: 141, abbr: 'TOR', name: 'Toronto Blue Jays' },
    { id: 120, abbr: 'WSH', name: 'Washington Nationals' },
  ];

  const BASE = 'https://statsapi.mlb.com/api/v1';
  const LOGO = id => `https://www.mlbstatic.com/team-logos/${id}.svg`;
  const STORAGE_KEY = 'mlb_status_team_id';

  let scoreVisible = false;
  let currentState = null;
  let selectedTeamId = parseInt(localStorage.getItem(STORAGE_KEY)) || 141;
  let previousStatus = null;
  let previousTeamId = null;
  let previousDate   = null;

  // ── Helpers ───────────────────────────────────────────────────────
  function getTeam(id) { return TEAMS.find(t => t.id === id) || TEAMS.find(t => t.id === 141); }

  function today() {
    const d = new Date();
    return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
  }

  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  }

  function updateHeader() {
    const team = getTeam(selectedTeamId);
    document.getElementById('wordmark').textContent = team.name.replace(/^(.*)\s(\S+)$/, '$2'); // last word
    document.getElementById('wordmark').textContent = team.name;
    document.getElementById('questionNote').textContent = `Is today's ${team.abbr} game done?`;
    document.title = `${team.abbr} Game Status`;
  }

  // ── Notifications ─────────────────────────────────────────────────
  function updateNotifBtn() {
    const btn = document.getElementById('notifBtn');
    if (!('Notification' in window)) { btn.style.display = 'none'; return; }
    const p = Notification.permission;
    if (p === 'granted') {
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.5L2.5 13A1 1 0 003 15h14a1 1 0 00.5-1.87L16 11.5V8a6 6 0 00-6-6zm0 16a2 2 0 01-2-2h4a2 2 0 01-2 2z"/></svg> On`;
      btn.classList.add('active');
      btn.classList.remove('denied');
      btn.disabled = false;
      btn.title = 'Notifications on — click to turn off';
      btn.onclick = () => { localStorage.setItem('mlb_notif_off', '1'); updateNotifBtn(); };
    } else if (p === 'denied') {
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.5L2.5 13A1 1 0 003 15h14a1 1 0 00.5-1.87L16 11.5V8a6 6 0 00-6-6zm0 16a2 2 0 01-2-2h4a2 2 0 01-2 2z"/></svg> Blocked`;
      btn.classList.add('denied');
      btn.classList.remove('active');
      btn.disabled = true;
      btn.title = 'Notifications blocked — enable in browser settings';
      btn.onclick = null;
    } else {
      const userOff = localStorage.getItem('mlb_notif_off');
      btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.5L2.5 13A1 1 0 003 15h14a1 1 0 00.5-1.87L16 11.5V8a6 6 0 00-6-6zm0 16a2 2 0 01-2-2h4a2 2 0 01-2 2z"/></svg> ${userOff ? 'Off' : 'Notify'}`;
      btn.classList.remove('active', 'denied');
      btn.disabled = false;
      btn.title = 'Get notified when game status changes';
      btn.onclick = async () => {
        localStorage.removeItem('mlb_notif_off');
        const result = await Notification.requestPermission();
        updateNotifBtn();
        if (result === 'granted') sendNotif('Notifications enabled', 'You\'ll be alerted when game status changes.');
      };
    }
  }

  function canNotify() {
    return 'Notification' in window &&
           Notification.permission === 'granted' &&
           !localStorage.getItem('mlb_notif_off');
  }

  function sendNotif(title, body, icon) {
    if (!canNotify()) return;
    const n = new Notification(title, {
      body,
      icon: icon || './icon.svg',
      badge: './icon.svg',
      tag: 'mlb-status',
      renotify: true,
    });
    n.onclick = () => { window.focus(); n.close(); };
  }

  function checkStatusChange(newData) {
    const dateStr = today();
    const sameTeam = previousTeamId === selectedTeamId;
    const sameDay  = previousDate === dateStr;
    const hadPrev  = previousStatus !== null && sameTeam && sameDay;

    if (hadPrev && previousStatus !== newData.status) {
      const team = getTeam(selectedTeamId);
      if (newData.status === 'live') {
        sendNotif(`${team.name} game started`, 'Game is now in progress.');
      } else if (newData.status === 'final') {
        const body = (showScores() && newData.score)
          ? (() => { const w = newData.score.myPts > newData.score.oppPts; return `Final: ${team.abbr} ${newData.score.myPts}–${newData.score.oppPts} ${newData.score.oppAbbr}. ${team.abbr} ${w ? 'won' : 'lost'}.`; })()
          : 'Game over.';
        sendNotif(`${team.name} game over`, body);
      }
    }

    previousStatus = newData.status;
    previousTeamId = selectedTeamId;
    previousDate   = dateStr;
  }

  function showScores() { return localStorage.getItem('mlb_show_scores') === '1'; }
  function scoresUnlocked() { return showScores() || scoreVisible; }

  // ── Render helpers ────────────────────────────────────────────────
  function revealBtn() {
    return `<button class="reveal-btn" id="revealBtn">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <ellipse cx="8" cy="8" rx="6.5" ry="5" stroke="currentColor" stroke-width="1.3"/>
        <circle cx="8" cy="8" r="2.2" stroke="currentColor" stroke-width="1.3"/>
      </svg>
      Reveal score
    </button>`;
  }

  function renderScoreBlock(s, teamAbbr) {
    if (!s) return '';
    const { myPts, oppPts, oppAbbr } = s;
    const myWin  = myPts > oppPts;
    const oppWin = oppPts > myPts;
    return `<div class="score-row">
      <span class="score-team">${teamAbbr}</span>
      <span class="score-pts ${myWin?'win':oppWin?'loss':'tie'}">${myPts}</span>
      <span class="score-sep">—</span>
      <span class="score-pts ${oppWin?'win':myWin?'loss':'tie'}">${oppPts}</span>
      <span class="score-team" style="text-align:right">${oppAbbr}</span>
    </div>`;
  }

  function renderMatchup(data) {
    if (!data.homeId) return '';
    const liveIndicator = data.status === 'live'
      ? `<div class="live-pip"><span class="live-dot"></span>In progress</div>` : '';
    let timeStr = data.gameTime || '';
    if (data.status === 'upcoming' && data.startTimeUTC) {
      const start = new Date(data.startTimeUTC);
      const mins  = Math.round((start - Date.now()) / 60000);
      const h = Math.floor(Math.abs(mins)/60), m = Math.abs(mins)%60;
      const cd = mins > 0 ? (h > 0 ? `${h}h ${m}m away` : `${m}m away`) : 'Starting soon';
      timeStr = `${data.gameTime} · ${cd}`;
    }
    return `<div class="matchup-callout">
      <div class="team-block">
        <img class="team-logo" src="${LOGO(data.awayId)}" alt="${data.awayAbbr}" onerror="this.style.display='none'">
        <span class="team-abbr">${data.awayAbbr}</span>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0">
        <span class="at-sep">@</span>
        <div class="game-meta">
          <div class="game-meta-time">${timeStr}</div>
          ${liveIndicator}
        </div>
      </div>
      <div class="team-block">
        <img class="team-logo" src="${LOGO(data.homeId)}" alt="${data.homeAbbr}" onerror="this.style.display='none'">
        <span class="team-abbr">${data.homeAbbr}</span>
      </div>
    </div>`;
  }

  function render(data) {
    checkStatusChange(data);
    currentState = data;
    const big         = document.getElementById('big');
    const detail      = document.getElementById('detail');
    const matchupArea = document.getElementById('matchup-area');
    document.getElementById('updated').textContent = 'Updated ' + nowTime();
    matchupArea.innerHTML = renderMatchup(data);
    updateHeader();

    const team = getTeam(selectedTeamId);

    if (data.status === 'live') {
      big.className = 'big-answer big-no';
      big.textContent = 'NO';
      const inningTxt  = data.inning ? `${data.inningHalf} ${data.inning}` : '';
      const inningHtml = inningTxt ? `<div class="inning-line">${inningTxt}</div>` : '';
      const scoreHtml  = scoresUnlocked() ? renderScoreBlock(data.score, team.abbr) : revealBtn();
      detail.innerHTML = `${inningHtml}<div>${scoreHtml}</div>`;

    } else if (data.status === 'final') {
      big.className = 'big-answer big-yes';
      big.textContent = 'YES';
      const won = data.score && data.score.myPts > data.score.oppPts;
      const scoreHtml = scoresUnlocked()
        ? renderScoreBlock(data.score, team.abbr) + `<div class="outcome-line">${team.abbr} ${won ? 'won' : 'lost'}</div>`
        : revealBtn();
      detail.innerHTML = `<div class="status-label">Game finished</div><div>${scoreHtml}</div>`;

    } else if (data.status === 'upcoming') {
      big.className = 'big-answer big-soon';
      big.textContent = 'Not yet';
      detail.innerHTML = `<div class="status-label">Game hasn't started yet</div>`;

    } else if (data.status === 'none') {
      big.className = 'big-answer big-yes';
      big.textContent = 'YES';
      detail.innerHTML = data.nextGame
        ? `<div class="status-label">No game today · Next: ${data.nextGame}</div>`
        : `<div class="status-label">No game scheduled today</div>`;

    } else if (data.status === 'error') {
      big.className = 'big-answer big-no';
      big.textContent = 'ERR';
      detail.innerHTML = `<div class="err-text">${data.message}</div>`;
    }

    const rb = document.getElementById('revealBtn');
    if (rb) rb.addEventListener('click', () => { scoreVisible = true; render(currentState); });
  }

  // ── Data loading ──────────────────────────────────────────────────
  async function load() {
    const btn = document.getElementById('refreshBtn');
    btn.disabled = true;
    btn.textContent = '...';
    scoreVisible = false;

    const teamId = selectedTeamId;
    const team   = getTeam(teamId);

    try {
      const schedRes  = await fetch(`${BASE}/schedule?sportId=1&teamId=${teamId}&date=${today()}&hydrate=linescore,team`);
      const schedData = await schedRes.json();
      const dates     = schedData.dates || [];

      if (!dates.length || !dates[0].games.length) {
        render({ status: 'none', nextGame: await getNextGame(teamId) });
        return;
      }

      const game          = dates[0].games[0];
      const gamePk        = game.gamePk;
      const abstractState = game.status.abstractGameState;
      const detailedState = game.status.detailedState;
      const homeTeam      = game.teams.home.team;
      const awayTeam      = game.teams.away.team;
      const isMyHome      = homeTeam.id === teamId;
      const oppTeam       = isMyHome ? awayTeam : homeTeam;
      const startUTC      = game.gameDate;
      const localTime     = new Date(startUTC).toLocaleTimeString([], {
        hour: 'numeric', minute: '2-digit', timeZone: 'America/Toronto'
      }) + ' ET';

      const base = {
        homeId: homeTeam.id, awayId: awayTeam.id,
        homeAbbr: homeTeam.abbreviation, awayAbbr: awayTeam.abbreviation,
        gameTime: localTime, startTimeUTC: startUTC,
      };

      if (abstractState === 'Live' || detailedState === 'In Progress') {
        const ls    = game.linescore || await fetchLinescore(gamePk);
        const myPts  = isMyHome ? (ls.teams?.home?.runs ?? '?') : (ls.teams?.away?.runs ?? '?');
        const oppPts = isMyHome ? (ls.teams?.away?.runs ?? '?') : (ls.teams?.home?.runs ?? '?');
        render({ ...base, status: 'live',
          inning: ls.currentInning ? `Inning ${ls.currentInning}` : '',
          inningHalf: ls.inningHalf || '',
          score: { myPts, oppPts, oppAbbr: oppTeam.abbreviation }
        });

      } else if (abstractState === 'Final' || detailedState.includes('Final')) {
        const ls    = game.linescore || await fetchLinescore(gamePk);
        const myPts  = isMyHome ? (ls.teams?.home?.runs ?? '?') : (ls.teams?.away?.runs ?? '?');
        const oppPts = isMyHome ? (ls.teams?.away?.runs ?? '?') : (ls.teams?.home?.runs ?? '?');
        render({ ...base, status: 'final',
          score: { myPts, oppPts, oppAbbr: oppTeam.abbreviation }
        });

      } else {
        render({ ...base, status: 'upcoming' });
      }

    } catch (e) {
      render({ status: 'error', message: 'Could not reach MLB API. Check your connection.' });
    }

    btn.disabled = false;
    btn.textContent = 'Refresh ↻';
  }

  async function fetchLinescore(gamePk) {
    const r = await fetch(`${BASE}/game/${gamePk}/linescore`);
    return r.json();
  }

  async function getNextGame(teamId) {
    try {
      const future = new Date(); future.setDate(future.getDate() + 1);
      const end    = new Date(); end.setDate(end.getDate() + 14);
      const fmt    = d => d.toISOString().slice(0, 10);
      const r      = await fetch(`${BASE}/schedule?sportId=1&teamId=${teamId}&startDate=${fmt(future)}&endDate=${fmt(end)}`);
      const d      = await r.json();
      const next   = d.dates?.[0]?.games?.[0];
      if (!next) return null;
      return new Date(next.gameDate).toLocaleDateString([], {
        weekday: 'short', month: 'short', day: 'numeric',
        hour: 'numeric', minute: '2-digit', timeZone: 'America/Toronto'
      }) + ' ET';
    } catch { return null; }
  }

  // ── Modal / team picker ───────────────────────────────────────────
  function buildTeamList(filter = '') {
    const list    = document.getElementById('teamList');
    const filtered = TEAMS.filter(t =>
      t.name.toLowerCase().includes(filter.toLowerCase()) ||
      t.abbr.toLowerCase().includes(filter.toLowerCase())
    );
    list.innerHTML = filtered.map(t => `
      <div class="team-option ${t.id === selectedTeamId ? 'selected' : ''}" data-id="${t.id}">
        <img src="${LOGO(t.id)}" alt="${t.abbr}" onerror="this.style.display='none'" width="28" height="28">
        <span class="team-option-name">${t.name}</span>
        <span class="team-option-abbr">${t.abbr}</span>
      </div>`).join('');

    list.querySelectorAll('.team-option').forEach(el => {
      el.addEventListener('click', () => {
        selectedTeamId = parseInt(el.dataset.id);
        localStorage.setItem(STORAGE_KEY, selectedTeamId);
        previousStatus = null; // don't notify on team switch
        closeModal();
        load();
      });
    });
  }

  function openModal()  {
    document.getElementById('modalBackdrop').classList.add('open');
    document.getElementById('showScoresTrack').classList.toggle('on', showScores());
    document.getElementById('teamSearch').value = '';
    buildTeamList();
    document.getElementById('teamSearch').focus();
    // Scroll selected into view
    setTimeout(() => {
      const sel = document.querySelector('.team-option.selected');
      if (sel) sel.scrollIntoView({ block: 'center' });
    }, 50);
  }

  function closeModal() { document.getElementById('modalBackdrop').classList.remove('open'); }

  document.getElementById('showScoresRow').addEventListener('click', () => {
    const next = !showScores();
    localStorage.setItem('mlb_show_scores', next ? '1' : '0');
    document.getElementById('showScoresTrack').classList.toggle('on', next);
    if (currentState) render(currentState);
  });

  document.getElementById('settingsBtn').addEventListener('click', openModal);
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalBackdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modalBackdrop')) closeModal();
  });
  document.getElementById('teamSearch').addEventListener('input', e => buildTeamList(e.target.value));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Init ──────────────────────────────────────────────────────────
  updateHeader();
  updateNotifBtn();
  load();
  setInterval(load, 60000);
</script>
</body>
</html>
